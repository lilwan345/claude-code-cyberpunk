<svg xmlns="http://www.w3.org/2000/svg" width="820" height="380" viewBox="0 0 820 380" role="img" aria-label="Cyberdeck — a cyberpunk skin for Claude Code">
  <defs>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff2e97"/>
      <stop offset="0.5" stop-color="#b46bff"/>
      <stop offset="1" stop-color="#00eaff"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#07050f"/>
      <stop offset="0.7" stop-color="#0a0820"/>
      <stop offset="1" stop-color="#140a2a"/>
    </linearGradient>
    <radialGradient id="neb1" cx="0.2" cy="0.3" r="0.5">
      <stop offset="0" stop-color="#ff2e97" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ff2e97" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="0.82" cy="0.28" r="0.5">
      <stop offset="0" stop-color="#00eaff" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#00eaff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb3" cx="0.55" cy="0.62" r="0.55">
      <stop offset="0" stop-color="#b46bff" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#b46bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff2e97"/>
      <stop offset="0.5" stop-color="#00eaff"/>
      <stop offset="1" stop-color="#34ffa6"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="820" height="380" fill="url(#sky)"/>
  <rect width="820" height="380" fill="url(#neb1)"/>
  <rect width="820" height="380" fill="url(#neb2)"/>
  <rect width="820" height="380" fill="url(#neb3)"/>

  <!-- perspective grid floor -->
  <g stroke="#00eaff" stroke-opacity="0.30" stroke-width="1">
    <line x1="0" y1="300" x2="820" y2="300"/>
    <line x1="0" y1="320" x2="820" y2="320"/>
    <line x1="0" y1="346" x2="820" y2="346"/>
    <line x1="0" y1="380" x2="820" y2="380"/>
  </g>
  <g stroke="#ff2e97" stroke-opacity="0.26" stroke-width="1">
    <line x1="410" y1="300" x2="120" y2="380"/>
    <line x1="410" y1="300" x2="260" y2="380"/>
    <line x1="410" y1="300" x2="410" y2="380"/>
    <line x1="410" y1="300" x2="560" y2="380"/>
    <line x1="410" y1="300" x2="700" y2="380"/>
  </g>
  <line x1="0" y1="300" x2="820" y2="300" stroke="#7df9ff" stroke-opacity="0.8" stroke-width="2"/>

  <!-- neon frame -->
  <rect x="8" y="8" width="804" height="364" rx="14" fill="none" stroke="url(#frame)" stroke-width="2" stroke-opacity="0.9"/>

  <!-- wordmark -->
  <text x="410" y="170" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="92" font-weight="700" fill="url(#title)" letter-spacing="2">Cyberdeck</text>
  <text x="410" y="214" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="22" fill="#cfeaff" letter-spacing="1">A cyberpunk skin for Claude Code</text>
  <text x="410" y="248" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="14" fill="#7df9ff" fill-opacity="0.8">animated backdrop · neon terminal frame · magenta → cyan shimmer</text>
</svg>
